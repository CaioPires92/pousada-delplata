services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SERVER_URL=${EVOLUTION_API_URL:-http://localhost:8080}
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR
      # Auth
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-change-me}
      # Database configuration
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${EVOLUTION_POSTGRES_PASSWORD:-evo_pass_2026}@evolution-postgres:5432/${EVOLUTION_POSTGRES_DB:-evolution}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=${EVOLUTION_DB_CLIENT_NAME:-evolution_api}
      # Redis configuration
      - REDIS_URI=redis://evolution-redis:6379
      - REDIS_PREFIX_KEY=${EVOLUTION_REDIS_PREFIX:-evolution}
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      - CACHE_REDIS_SAVE_INSTANCES=false
      # Reduce Baileys startup pressure while generating the first QR code.
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - DATABASE_SAVE_DATA_LABELS=false
      # General configs
      - WEBSOCKET_ENABLED=true
      - RABBITMQ_ENABLED=false
      - WEBHOOK_GLOBAL_ENABLED=false
    depends_on:
      - evolution-postgres
      - evolution-redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${EVOLUTION_POSTGRES_PASSWORD:-evo_pass_2026}
      - POSTGRES_DB=${EVOLUTION_POSTGRES_DB:-evolution}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  evolution_instances:
  evolution_store:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1200
